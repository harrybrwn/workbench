name: release

on:
  workflow_dispatch:
    inputs:
      version:
        required: true
        description: "Version tag for the new release."
        type: string

jobs:
  release:
    permissions: write-all
    name: release
    runs-on: ubuntu-24.04
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}
      - name: Checkout Code
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.version }}
      - name: Set up QEMU
        id: qemu
        uses: docker/setup-qemu-action@v4
      - name: Setup docker buildx
        uses: docker/setup-buildx-action@v4
        id: buildx
      - name: Build
        env:
          DOCKER_BUILDKIT: "1"
          BUILDX_BAKE_ENTITLEMENTS_FS: "0"
          VERSION: ${{ inputs.version }}
        run: |
          ssh -T git@github.com || true
          docker buildx bake --allow=ssh workbench-dist
      - name: Create Default Asset
        run: |
          cp docker-build/workbench*_bookworm_amd64.deb docker-build/workbench_amd64.deb
      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create ${{ inputs.version }} --latest --generate-notes --title "${{ inputs.version }}" docker-build/*.deb

